<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RapidRAW - 哈苏色彩编辑器</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
</head>
<body>

<div id="app">
  <!-- ==================== LIBRARY VIEW ==================== -->
  <div id="library-view" class="view active">
    <div class="top-bar">
      <div class="top-bar-left">
        <h1 class="app-title">RapidRAW</h1>
      </div>
      <div class="top-bar-right">
        <button class="icon-btn" id="btn-search"><span class="material-icons-round">search</span></button>
        <button class="icon-btn" id="btn-filter"><span class="material-icons-round">tune</span></button>
      </div>
    </div>
    <div class="folder-chips">
      <button class="chip active" data-folder="all">全部</button>
      <button class="chip" data-folder="dcim">DCIM</button>
      <button class="chip" data-folder="downloads">下载</button>
      <button class="chip" data-folder="screenshots">截图</button>
    </div>
    <div class="image-grid" id="image-grid"></div>
    <div class="bottom-nav">
      <button class="nav-item active" data-view="library">
        <span class="material-icons-round">photo_library</span>
        <span class="nav-label">图库</span>
      </button>
      <button class="nav-item" data-view="folders">
        <span class="material-icons-round">folder</span>
        <span class="nav-label">文件夹</span>
      </button>
      <button class="nav-item" data-view="settings">
        <span class="material-icons-round">settings</span>
        <span class="nav-label">设置</span>
      </button>
    </div>
  </div>

  <!-- ==================== EDITOR VIEW ==================== -->
  <div id="editor-view" class="view">
    <!-- Editor Top Bar -->
    <div class="editor-top-bar">
      <button class="icon-btn" id="btn-back"><span class="material-icons-round">arrow_back</span></button>
      <div class="editor-title">编辑</div>
      <div class="editor-top-actions">
        <button class="icon-btn" id="btn-exif"><span class="material-icons-round">info</span></button>
        <button class="icon-btn" id="btn-undo"><span class="material-icons-round">undo</span></button>
        <button class="icon-btn" id="btn-redo"><span class="material-icons-round">redo</span></button>
      </div>
    </div>

    <!-- Image Preview Area -->
    <div class="preview-area" id="preview-area">
      <img id="preview-image" src="" alt="Preview">
      <!-- Smart optimization badge -->
      <div class="optimized-badge" id="optimized-badge">
        <span class="badge-dot"></span>
        已优化
      </div>
      <!-- Long-press original overlay -->
      <div class="original-overlay" id="original-overlay">原图</div>
      <!-- Histogram -->
      <div class="histogram-overlay" id="histogram">
        <svg viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="histGrad" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.2"/>
              <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.6"/>
              <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.2"/>
            </linearGradient>
          </defs>
          <path id="hist-path" fill="url(#histGrad)" stroke="rgba(255,255,255,0.5)" stroke-width="0.5" d=""/>
        </svg>
      </div>
    </div>

    <!-- Bottom Tab Bar: 4 tabs -->
    <div class="tab-bar" id="tab-bar">
      <button class="tab active" data-tab="film">
        <span class="material-icons-round" style="font-size:18px">filter</span>
        <span>胶片</span>
      </button>
      <button class="tab" data-tab="adjust">
        <span class="material-icons-round" style="font-size:18px">tune</span>
        <span>调节</span>
      </button>
      <button class="tab" data-tab="crop">
        <span class="material-icons-round" style="font-size:18px">crop</span>
        <span>裁剪</span>
      </button>
      <button class="tab" data-tab="export">
        <span class="material-icons-round" style="font-size:18px">share</span>
        <span>导出</span>
      </button>
    </div>

    <!-- ==================== FILM PANEL ==================== -->
    <div class="panel-content active" data-panel="film">
      <div class="film-header">
        <span class="film-title">哈苏大师胶片</span>
        <span class="film-title-underline"></span>
      </div>
      <div class="film-category-tabs">
        <button class="film-cat-tab active" data-cat="classic">原生经典</button>
        <button class="film-cat-tab" data-cat="emotional">情绪表达</button>
        <button class="film-cat-tab" data-cat="structural">结构时间</button>
      </div>
      <div class="film-grid" id="film-grid">
        <!-- Dynamically populated -->
      </div>
      <div class="presets-section">
        <div class="presets-header">
          <span class="presets-title">我的预设</span>
          <button class="add-preset-btn" id="btn-add-preset">
            <span class="material-icons-round" style="font-size:16px">add</span>
          </button>
        </div>
        <div class="presets-grid" id="presets-grid">
          <div class="preset-item add-preset-item">
            <div class="preset-thumb"><span class="material-icons-round">add</span></div>
            <span>新建预设</span>
          </div>
        </div>
      </div>
    </div>

    <!-- ==================== ADJUST PANEL ==================== -->
    <div class="panel-content" data-panel="adjust">
      <div class="slider-row" data-param="intensity">
        <span class="slider-label">强度</span>
        <div class="slider-track-container">
          <div class="slider-track">
            <div class="slider-fill"></div>
            <div class="slider-center-mark"></div>
            <div class="slider-thumb"></div>
          </div>
        </div>
        <span class="slider-value">0</span>
      </div>
      <div class="slider-row" data-param="softlight">
        <span class="slider-label">柔光</span>
        <div class="slider-track-container">
          <div class="slider-track">
            <div class="slider-fill"></div>
            <div class="slider-center-mark"></div>
            <div class="slider-thumb"></div>
          </div>
        </div>
        <span class="slider-value">0</span>
      </div>
      <div class="slider-row" data-param="tone">
        <span class="slider-label">影调</span>
        <div class="slider-track-container">
          <div class="slider-track">
            <div class="slider-fill"></div>
            <div class="slider-center-mark"></div>
            <div class="slider-thumb"></div>
          </div>
        </div>
        <span class="slider-value">0</span>
      </div>
      <div class="slider-row" data-param="saturation">
        <span class="slider-label">饱和度</span>
        <div class="slider-track-container">
          <div class="slider-track">
            <div class="slider-fill"></div>
            <div class="slider-center-mark"></div>
            <div class="slider-thumb"></div>
          </div>
        </div>
        <span class="slider-value">0</span>
      </div>
      <div class="slider-row" data-param="temperature">
        <span class="slider-label">冷暖</span>
        <div class="slider-track-container">
          <div class="slider-track">
            <div class="slider-fill"></div>
            <div class="slider-center-mark"></div>
            <div class="slider-thumb"></div>
          </div>
        </div>
        <span class="slider-value">0</span>
      </div>
      <div class="slider-row" data-param="tint">
        <span class="slider-label">青品</span>
        <div class="slider-track-container">
          <div class="slider-track">
            <div class="slider-fill"></div>
            <div class="slider-center-mark"></div>
            <div class="slider-thumb"></div>
          </div>
        </div>
        <span class="slider-value">0</span>
      </div>
      <div class="slider-row" data-param="sharpness">
        <span class="slider-label">锐度</span>
        <div class="slider-track-container">
          <div class="slider-track">
            <div class="slider-fill"></div>
            <div class="slider-center-mark"></div>
            <div class="slider-thumb"></div>
          </div>
        </div>
        <span class="slider-value">0</span>
      </div>
      <div class="slider-row" data-param="vignette">
        <span class="slider-label">暗角</span>
        <div class="slider-track-container">
          <div class="slider-track">
            <div class="slider-fill"></div>
            <div class="slider-center-mark"></div>
            <div class="slider-thumb"></div>
          </div>
        </div>
        <span class="slider-value">0</span>
      </div>
      <div class="slider-row" data-param="dehaze">
        <span class="slider-label">去雾</span>
        <div class="slider-track-container">
          <div class="slider-track">
            <div class="slider-fill"></div>
            <div class="slider-center-mark"></div>
            <div class="slider-thumb"></div>
          </div>
        </div>
        <span class="slider-value">0</span>
      </div>
    </div>

    <!-- ==================== CROP PANEL ==================== -->
    <div class="panel-content" data-panel="crop">
      <div class="crop-ratios">
        <button class="crop-ratio-btn active" data-ratio="free">自由</button>
        <button class="crop-ratio-btn" data-ratio="1:1">1:1</button>
        <button class="crop-ratio-btn" data-ratio="4:3">4:3</button>
        <button class="crop-ratio-btn" data-ratio="3:2">3:2</button>
        <button class="crop-ratio-btn" data-ratio="16:9">16:9</button>
        <button class="crop-ratio-btn xpan-btn" data-ratio="65:24">
          <span class="ratio-main">65:24</span>
          <span class="ratio-sub">XPAN</span>
        </button>
      </div>
      <div class="crop-tools">
        <button class="crop-tool-btn" id="btn-flip-h">
          <span class="material-icons-round">flip</span>
          <span>水平翻转</span>
        </button>
        <button class="crop-tool-btn" id="btn-flip-v">
          <span class="material-icons-round" style="transform:rotate(90deg)">flip</span>
          <span>垂直翻转</span>
        </button>
        <button class="crop-tool-btn" id="btn-rotate-ccw">
          <span class="material-icons-round">rotate_90_degrees_ccw</span>
          <span>逆时针</span>
        </button>
        <button class="crop-tool-btn" id="btn-rotate-cw">
          <span class="material-icons-round">rotate_90_degrees_cw</span>
          <span>顺时针</span>
        </button>
      </div>
      <div class="slider-row" data-param="rotation">
        <span class="slider-label">旋转</span>
        <div class="slider-track-container">
          <div class="slider-track">
            <div class="slider-fill"></div>
            <div class="slider-center-mark"></div>
            <div class="slider-thumb"></div>
          </div>
        </div>
        <span class="slider-value">0</span>
      </div>
    </div>

    <!-- ==================== EXPORT PANEL ==================== -->
    <div class="panel-content" data-panel="export">
      <div class="export-section">
        <div class="export-label">格式</div>
        <div class="format-options">
          <label class="format-option active">
            <input type="radio" name="format" value="jpeg" checked>
            <span class="format-btn">JPEG</span>
          </label>
          <label class="format-option">
            <input type="radio" name="format" value="png">
            <span class="format-btn">PNG</span>
          </label>
          <label class="format-option">
            <input type="radio" name="format" value="tiff">
            <span class="format-btn">TIFF</span>
          </label>
        </div>
      </div>
      <div class="export-section" id="quality-section">
        <div class="export-label">质量 <span id="quality-val">95</span>%</div>
        <div class="export-slider-track">
          <div class="export-slider-fill" style="width:95%"></div>
          <div class="export-slider-thumb" style="left:95%"></div>
        </div>
      </div>
      <div class="export-section">
        <div class="export-label">调整大小</div>
        <div class="resize-options">
          <button class="resize-btn active">原始</button>
          <button class="resize-btn">75%</button>
          <button class="resize-btn">50%</button>
          <button class="resize-btn">25%</button>
        </div>
      </div>
      <div class="export-section">
        <div class="export-label">色彩空间</div>
        <div class="resize-options">
          <button class="resize-btn active">sRGB</button>
          <button class="resize-btn">Adobe RGB</button>
          <button class="resize-btn">P3</button>
        </div>
      </div>
      <button class="export-btn" id="btn-export">导出</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
