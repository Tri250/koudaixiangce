name: Build & Test

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish release artifacts'
        type: boolean
        default: false

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

jobs:
  # ── Unit Tests ──────────────────────────────────────────────────────
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run Unit Tests
        run: ./gradlew test --no-daemon --continue

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            app/build/reports/tests/
            app/build/test-results/
          retention-days: 7

  # ── Coverage Report ─────────────────────────────────────────────────
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run Coverage Tests
        run: ./gradlew testDebugUnitTestCoverage --no-daemon --continue

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/build/reports/coverage/
          retention-days: 7

      - name: Extract Coverage Percentage
        if: always()
        id: coverage
        run: |
          COVERAGE_FILE="app/build/reports/coverage/index.html"
          if [ -f "$COVERAGE_FILE" ]; then
            # Extract coverage percentage from JaCoCo HTML report
            COVERAGE=$(grep -oP '<td class="ctr2"[^>]*>\s*\K[0-9]+(?=%)' "$COVERAGE_FILE" | head -1 || echo "0")
            echo "percentage=${COVERAGE}" >> "$GITHUB_OUTPUT"
            echo "Coverage: ${COVERAGE}%"
          else
            echo "percentage=0" >> "$GITHUB_OUTPUT"
            echo "Coverage report not found"
          fi

      - name: Coverage Summary
        if: always()
        run: |
          COVERAGE="${{ steps.coverage.outputs.percentage }}"
          echo "## Coverage Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Line Coverage | ${COVERAGE}% |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${COVERAGE}" -ge 40 ]; then
            echo ":white_check_mark: Coverage meets the 40% minimum threshold" >> "$GITHUB_STEP_SUMMARY"
          else
            echo ":warning: Coverage is below the 40% minimum threshold (current: ${COVERAGE}%)" >> "$GITHUB_STEP_SUMMARY"
          fi

  # ── Coverage Gate ───────────────────────────────────────────────────
  coverage-gate:
    name: Coverage Gate
    runs-on: ubuntu-latest
    needs: [coverage]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Coverage Report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage-report
        continue-on-error: true

      - name: Check Coverage Threshold
        run: |
          COVERAGE_FILE="coverage-report/index.html"
          if [ -f "$COVERAGE_FILE" ]; then
            COVERAGE=$(grep -oP '<td class="ctr2"[^>]*>\s*\K[0-9]+(?=%)' "$COVERAGE_FILE" | head -1 || echo "0")
            echo "Coverage: ${COVERAGE}%"
            if [ "${COVERAGE}" -ge 40 ]; then
              echo "::notice::Coverage gate passed: ${COVERAGE}% >= 40%"
            else
              echo "::warning::Coverage gate warning: ${COVERAGE}% < 40% minimum threshold"
            fi
          else
            echo "::warning::Coverage report not available, skipping gate check"
          fi

  # ── Test Report ─────────────────────────────────────────────────────
  test-report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: [unit-test]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Test Results
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: test-results
        continue-on-error: true

      - name: Publish Test Summary
        run: |
          echo "## Unit Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Parse JUnit XML results to extract pass/fail counts
          TOTAL=0
          PASSED=0
          FAILED=0
          ERRORS=0
          SKIPPED=0

          XML_DIR="test-results/app/build/test-results"
          if [ -d "$XML_DIR" ]; then
            for xml in "$XML_DIR"/test*/*.xml "$XML_DIR"/*.xml; do
              [ -f "$xml" ] || continue
              t=$(grep -oP 'tests="\K[0-9]+' "$xml" | head -1 || echo "0")
              p=$(grep -oP 'failures="\K[0-9]+' "$xml" | head -1 || echo "0")
              e=$(grep -oP 'errors="\K[0-9]+' "$xml" | head -1 || echo "0")
              s=$(grep -oP 'skipped="\K[0-9]+' "$xml" | head -1 || echo "0")
              TOTAL=$((TOTAL + t))
              FAILED=$((FAILED + p))
              ERRORS=$((ERRORS + e))
              SKIPPED=$((SKIPPED + s))
            done
            PASSED=$((TOTAL - FAILED - ERRORS - SKIPPED))
          fi

          echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total Tests | ${TOTAL} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Passed | ${PASSED} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Failed | ${FAILED} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Errors | ${ERRORS} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Skipped | ${SKIPPED} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAILED" -gt 0 ] || [ "$ERRORS" -gt 0 ]; then
            echo ":x: ${FAILED} failures, ${ERRORS} errors" >> "$GITHUB_STEP_SUMMARY"
          elif [ "$TOTAL" -gt 0 ]; then
            echo ":white_check_mark: All ${TOTAL} tests passed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo ":warning: No test results found" >> "$GITHUB_STEP_SUMMARY"
          fi

  # ── Lint Check ──────────────────────────────────────────────────────
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run Lint
        run: ./gradlew lint --no-daemon --continue

      - name: Upload Lint Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: app/build/reports/lint-results*.html
          retention-days: 7

  # ── Debug Build (always) ────────────────────────────────────────────
  debug-build:
    name: Debug Build
    runs-on: ubuntu-latest
    needs: [unit-test, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

  # ── Release Build (only on main push or manual trigger) ─────────────
  release-build:
    name: Release Build
    runs-on: ubuntu-latest
    needs: [unit-test, lint]
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Decode Release Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set. Skipping release build."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > app/release.keystore

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload Release Bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 30