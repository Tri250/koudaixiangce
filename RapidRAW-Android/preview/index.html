<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RapidRAW · ColorOS 16 · Find X9</title>
<style>
/* ═══════════════════════════════════════════════════════════════
   ColorOS 16 设计系统 Token — 资深设计师校准版
   简洁 · 大气 · 瀑布流 · 哈苏橙主题
   ═══════════════════════════════════════════════════════════════ */
:root {
  /* AMOLED 深黑基底 */
  --amoled-black: #060606;
  --surface-1: #0F0F10;
  --surface-2: #161618;
  --surface-3: #1E1E22;
  --surface-4: #26262B;
  --hairline: rgba(255,255,255,0.06);
  --hairline-strong: rgba(255,255,255,0.12);

  /* 文字色阶 */
  --text-high: #F5F5F7;
  --text-medium: #B4B4BA;
  --text-low: #7A7A82;

  /* 哈苏橙品牌色 */
  --hsb-orange: #E8600C;
  --hsb-orange-bright: #F2803F;
  --hsb-orange-deep: #B84D0A;

  /* 功能色 */
  --clip-red: #FF453A;
  --success-green: #30D158;
  --ai-purple: #BF5AF2;

  /* 圆角阶梯 */
  --r-small: 8px;
  --r-medium: 16px;
  --r-large: 24px;
  --r-xlarge: 28px;
  --r-pill: 9999px;

  /* Motion */
  --ease-emphasized: cubic-bezier(0.2, 0.0, 0.0, 1.0);
  --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
  --dur-fast: 150ms;
  --dur-normal: 300ms;
  --dur-slow: 450ms;

  /* 间距 */
  --sp-xs: 8px;
  --sp-sm: 12px;
  --sp-md: 16px;
  --sp-lg: 20px;
  --sp-xl: 24px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: "OPPO Sans", "OPPO-Sans", "HarmonyOS Sans SC", -apple-system,
    "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #000;
  color: var(--text-high);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ═══ 手机外壳 ═══ */
.phone {
  width: 412px;
  height: 915px;
  background: var(--amoled-black);
  border-radius: 48px;
  border: 3px solid #1a1a1a;
  box-shadow: 0 0 80px rgba(232,96,12,0.15), 0 20px 60px rgba(0,0,0,0.8);
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
}
.phone::after {
  content: '';
  position: absolute;
  top: -20%; right: -30%;
  width: 60%; height: 60%;
  background: radial-gradient(circle, rgba(232,96,12,0.10) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
.phone::before {
  content: '';
  position: absolute;
  top: 12px; left: 50%;
  transform: translateX(-50%);
  width: 120px; height: 28px;
  background: #000;
  border-radius: var(--r-pill);
  z-index: 200;
}
.phone > * { position: relative; z-index: 10; }

/* ═══ 状态栏 ═══ */
.status-bar {
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px var(--sp-xl) 0 28px;
  font-size: 14px;
  font-weight: 600;
  flex-shrink: 0;
}
.status-bar .right { display: flex; gap: 6px; align-items: center; }
.status-bar svg { width: 16px; height: 16px; }

/* ═══ 顶栏 ═══ */
.top-bar {
  height: 52px;
  display: flex;
  align-items: center;
  padding: 0 var(--sp-xs);
  gap: 2px;
  flex-shrink: 0;
}
.icon-btn {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  cursor: pointer;
  color: var(--text-medium);
  transition: all var(--dur-fast) var(--ease-emphasized);
}
.icon-btn:hover { background: var(--surface-3); color: var(--text-high); transform: scale(0.92); }
.icon-btn svg { width: 22px; height: 22px; }

.title-pill { flex: 1; display: flex; justify-content: center; }
.title-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 6px var(--sp-md);
  border-radius: var(--r-pill);
  font-size: 12px; font-weight: 500;
  color: var(--text-medium);
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
}
.title-chip .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--hsb-orange);
  box-shadow: 0 0 8px var(--hsb-orange);
}

.export-shortcut {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  cursor: pointer;
  background: var(--hsb-orange);
  color: #fff;
  transition: all var(--dur-fast) var(--ease-emphasized);
  box-shadow: 0 4px 16px rgba(232,96,12,0.35);
}
.export-shortcut:hover { transform: scale(0.92); }
.export-shortcut svg { width: 20px; height: 20px; }

/* ═══ 预览区 ═══ */
.preview-area {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--amoled-black);
}
.preview-img {
  width: 100%; height: 100%;
  object-fit: cover;
  filter: contrast(1.05) saturate(1.12);
}

/* 取景器四角 */
.vf-corner {
  position: absolute;
  width: 28px; height: 28px;
  border-color: var(--hsb-orange);
  border-style: solid;
  border-width: 0;
  opacity: 0.8;
}
.vf-tl { top: 16px; left: 16px; border-top-width: 2px; border-left-width: 2px; border-top-left-radius: 6px; }
.vf-tr { top: 16px; right: 16px; border-top-width: 2px; border-right-width: 2px; border-top-right-radius: 6px; }
.vf-bl { bottom: 16px; left: 16px; border-bottom-width: 2px; border-left-width: 2px; border-bottom-left-radius: 6px; }
.vf-br { bottom: 16px; right: 16px; border-bottom-width: 2px; border-right-width: 2px; border-bottom-right-radius: 6px; }

/* 浮动工具栏 — 液态玻璃 */
.floating-toolbar {
  position: absolute;
  top: 12px; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 2px; align-items: center;
  padding: 6px;
  border-radius: var(--r-xlarge);
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(32px) saturate(1.3);
  border: 1px solid rgba(255,255,255,0.14);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.32);
}
.float-tool {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--r-large);
  cursor: pointer;
  color: var(--text-medium);
  transition: all var(--dur-fast) var(--ease-emphasized);
  position: relative;
}
.float-tool:hover { color: var(--text-high); background: rgba(255,255,255,0.08); }
.float-tool.active {
  color: var(--hsb-orange-bright);
  background: rgba(232,96,12,0.18);
  box-shadow: 0 0 12px rgba(232,96,12,0.25);
}
.float-tool svg { width: 18px; height: 18px; }

/* 场景/HDR 标签 */
.scene-badge {
  position: absolute;
  bottom: 16px; left: 16px;
  display: flex; align-items: center; gap: 8px;
  padding: 7px var(--sp-md);
  border-radius: var(--r-pill);
  font-size: 12px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.12);
}
.scene-badge .label { color: var(--text-low); }
.scene-badge .value { color: var(--hsb-orange-bright); font-weight: 700; }

.hdr-badge {
  position: absolute;
  bottom: 16px; right: 16px;
  padding: 5px 10px;
  border-radius: var(--r-pill);
  font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
  color: var(--text-high);
  background: rgba(10,132,255,0.20);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(10,132,255,0.35);
}

/* ═══════════════════════════════════════════════════════════════
   底部面板 — 液态玻璃抽屉（大气 · 简洁）
   ═══════════════════════════════════════════════════════════════ */
.panel-area {
  flex-shrink: 0;
  height: 400px;
  background: rgba(10,10,11,0.95);
  backdrop-filter: blur(32px) saturate(1.2);
  border-top: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--r-xlarge) var(--r-xlarge) 0 0;
  box-shadow: 0 -8px 40px rgba(0,0,0,0.6);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-handle {
  width: 36px; height: 4px;
  border-radius: var(--r-pill);
  background: rgba(255,255,255,0.30);
  margin: 8px auto 2px;
  flex-shrink: 0;
}

/* ═══ Tab 栏 — 强化可见性 ═══ */
.bottom-tabs {
  display: flex;
  padding: 6px 8px 8px;
  flex-shrink: 0;
  background: rgba(0,0,0,0.30);
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.tab {
  flex: 1;
  padding: 10px 0 8px;
  text-align: center;
  cursor: pointer;
  position: relative;
  border-radius: var(--r-medium);
  transition: background var(--dur-normal) var(--ease-emphasized);
}
.tab:hover { background: rgba(255,255,255,0.04); }
.tab .tab-icon {
  width: 24px; height: 24px;
  margin: 0 auto 4px;
  display: block;
  color: var(--text-low);
  transition: all var(--dur-normal) var(--ease-bounce);
}
.tab .tab-label {
  font-size: 11px; font-weight: 500;
  color: var(--text-low);
  letter-spacing: 0.5px;
  transition: color var(--dur-normal) var(--ease-emphasized);
}
.tab.active { background: rgba(232,96,12,0.12); }
.tab.active .tab-icon {
  color: var(--hsb-orange-bright);
  transform: translateY(-2px) scale(1.12);
  filter: drop-shadow(0 0 8px rgba(232,96,12,0.6));
}
.tab.active .tab-label { color: var(--hsb-orange-bright); font-weight: 700; }
.tab.active::after {
  content: '';
  position: absolute;
  bottom: 2px; left: 50%;
  transform: translateX(-50%);
  width: 32px; height: 3px;
  background: var(--hsb-orange);
  border-radius: var(--r-pill);
  box-shadow: 0 0 10px rgba(232,96,12,0.8);
}

/* 面板内容 */
.panel-content {
  flex: 1;
  overflow-y: auto;
  padding: var(--sp-md);
}
.panel-content::-webkit-scrollbar { width: 0; }

/* 面板入场动画 */
.panel-section { animation: panelEnter var(--dur-slow) var(--ease-emphasized); }
@keyframes panelEnter {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════════════════════════════════════
   AI 面板 — 瀑布流卡片（大气 · 简洁）
   ═══════════════════════════════════════════════════════════════ */

/* Hero 卡片（一键智能优化）— 大气全宽 */
.ai-hero {
  display: flex;
  align-items: center;
  gap: var(--sp-md);
  padding: var(--sp-lg) var(--sp-md);
  border-radius: var(--r-large);
  margin-bottom: var(--sp-md);
  cursor: pointer;
  background: linear-gradient(135deg, rgba(232,96,12,0.18), rgba(232,96,12,0.06));
  border: 1px solid rgba(232,96,12,0.30);
  transition: all var(--dur-fast) var(--ease-emphasized);
  position: relative;
  overflow: hidden;
}
.ai-hero::before {
  content: '';
  position: absolute;
  top: -50%; right: -20%;
  width: 60%; height: 200%;
  background: radial-gradient(circle, rgba(232,96,12,0.15), transparent 70%);
  pointer-events: none;
}
.ai-hero:hover { transform: scale(0.98); border-color: rgba(232,96,12,0.5); }
.ai-hero-icon {
  width: 48px; height: 48px;
  border-radius: var(--r-medium);
  background: var(--hsb-orange);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 4px 16px rgba(232,96,12,0.40);
}
.ai-hero-icon svg { width: 26px; height: 26px; stroke: #fff; }
.ai-hero-text { flex: 1; }
.ai-hero-title { font-size: 17px; font-weight: 700; color: var(--text-high); }
.ai-hero-sub { font-size: 12px; color: var(--text-medium); margin-top: 3px; }

/* 场景识别条 */
.scene-strip {
  display: flex;
  align-items: center;
  gap: var(--sp-sm);
  padding: 10px var(--sp-md);
  border-radius: var(--r-medium);
  margin-bottom: var(--sp-md);
  background: rgba(255,255,255,0.04);
}
.scene-strip .ss-label { font-size: 12px; color: var(--text-low); }
.scene-strip .ss-value { font-size: 14px; color: var(--hsb-orange-bright); font-weight: 700; }
.scene-strip .ss-conf { margin-left: auto; font-size: 11px; color: var(--text-low); }

/* 瀑布流容器 — 2 列 masonry */
.waterfall {
  column-count: 2;
  column-gap: var(--sp-sm);
}
.waterfall > * {
  break-inside: avoid;
  margin-bottom: var(--sp-sm);
  display: inline-block;
  width: 100%;
}

/* AI 功能卡片（瀑布流） */
.ai-card-wf {
  padding: var(--sp-md);
  border-radius: var(--r-medium);
  cursor: pointer;
  background: rgba(255,255,255,0.04);
  border: 1px solid transparent;
  transition: all var(--dur-fast) var(--ease-emphasized);
}
.ai-card-wf:hover {
  background: rgba(255,255,255,0.08);
  border-color: var(--hairline-strong);
  transform: scale(0.97);
}
.ai-card-wf .acw-icon {
  width: 36px; height: 36px;
  border-radius: var(--r-small);
  background: var(--surface-3);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: var(--sp-sm);
}
.ai-card-wf .acw-icon svg { width: 20px; height: 20px; stroke: var(--text-medium); }
.ai-card-wf .acw-title { font-size: 14px; font-weight: 600; color: var(--text-high); }
.ai-card-wf .acw-sub { font-size: 11px; color: var(--text-low); margin-top: 3px; line-height: 1.4; }

/* ═══════════════════════════════════════════════════════════════
   滤镜面板 — 瀑布流胶片预设（大气）
   ═══════════════════════════════════════════════════════════════ */

/* 分类标签 */
.cat-chips {
  display: flex;
  gap: var(--sp-xs);
  overflow-x: auto;
  padding-bottom: var(--sp-md);
  scrollbar-width: none;
}
.cat-chips::-webkit-scrollbar { display: none; }
.cat-chip {
  flex-shrink: 0;
  padding: 7px var(--sp-md);
  border-radius: var(--r-pill);
  font-size: 12px; font-weight: 500;
  color: var(--text-medium);
  background: rgba(255,255,255,0.04);
  cursor: pointer;
  transition: all var(--dur-fast) var(--ease-emphasized);
}
.cat-chip.active {
  color: var(--hsb-orange-bright);
  background: rgba(232,96,12,0.15);
  border: 1px solid rgba(232,96,12,0.40);
  font-weight: 700;
}

/* 瀑布流胶片预设 — 2 列 masonry 变高度 */
.film-waterfall {
  column-count: 2;
  column-gap: var(--sp-sm);
}
.film-wf-card {
  break-inside: avoid;
  margin-bottom: var(--sp-sm);
  display: inline-block;
  width: 100%;
  cursor: pointer;
  transition: transform var(--dur-normal) var(--ease-bounce);
}
.film-wf-card:hover { transform: translateY(-3px); }
.film-wf-thumb {
  border-radius: var(--r-medium);
  overflow: hidden;
  border: 2px solid transparent;
  transition: all var(--dur-fast) var(--ease-emphasized);
  position: relative;
}
.film-wf-card.active .film-wf-thumb {
  border-color: var(--hsb-orange);
  box-shadow: 0 0 20px rgba(232,96,12,0.35);
}
.film-wf-thumb img { width: 100%; display: block; }
.film-wf-name {
  font-size: 12px;
  color: var(--text-medium);
  text-align: center;
  margin-top: 6px;
  font-weight: 500;
}
.film-wf-card.active .film-wf-name { color: var(--hsb-orange-bright); font-weight: 700; }

/* LUT 库入口 */
.lut-entry {
  display: flex; align-items: center; gap: var(--sp-sm);
  padding: var(--sp-md);
  border-radius: var(--r-medium);
  margin-bottom: var(--sp-md);
  cursor: pointer;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--hairline);
}
.lut-entry:hover { background: rgba(255,255,255,0.08); }
.lut-entry svg { width: 22px; height: 22px; color: var(--hsb-orange-bright); }
.lut-entry .lut-title { font-size: 14px; font-weight: 600; color: var(--text-high); flex: 1; }
.lut-entry .lut-count { font-size: 11px; color: var(--text-low); }

/* ═══════════════════════════════════════════════════════════════
   调整面板 — 简洁分组滑块
   ═══════════════════════════════════════════════════════════════ */
.adjust-group { margin-bottom: var(--sp-lg); }
.adjust-group-title {
  font-size: 11px; font-weight: 600;
  color: var(--text-low);
  letter-spacing: 1px;
  margin-bottom: var(--sp-xs);
  text-transform: uppercase;
}

/* 色彩科学横向芯片 */
.cs-row {
  display: flex; gap: var(--sp-xs);
  overflow-x: auto;
  padding-bottom: var(--sp-md);
  scrollbar-width: none;
}
.cs-row::-webkit-scrollbar { display: none; }
.cs-chip {
  flex-shrink: 0;
  padding: 8px var(--sp-md);
  border-radius: var(--r-pill);
  font-size: 12px; font-weight: 500;
  color: var(--text-medium);
  background: rgba(255,255,255,0.04);
  cursor: pointer;
  transition: all var(--dur-fast) var(--ease-emphasized);
}
.cs-chip.active {
  color: var(--hsb-orange-bright);
  background: rgba(232,96,12,0.15);
  border: 1px solid rgba(232,96,12,0.40);
  font-weight: 700;
}

/* 滑块行 */
.slider-row {
  display: flex; align-items: center; gap: var(--sp-md);
  padding: 10px 0;
  height: 44px;
}
.slider-label {
  font-size: 13px; font-weight: 500;
  color: var(--text-medium);
  width: 60px; flex-shrink: 0;
}
.slider-track {
  flex: 1; height: 4px;
  border-radius: var(--r-pill);
  background: rgba(255,255,255,0.12);
  position: relative;
}
.slider-fill {
  position: absolute; top: 0; bottom: 0;
  border-radius: var(--r-pill);
  background: rgba(255,255,255,0.87);
}
.slider-row.active .slider-fill {
  background: linear-gradient(90deg, var(--hsb-orange-deep), var(--hsb-orange-bright));
  box-shadow: 0 0 8px rgba(232,96,12,0.4);
}
.slider-row.active .slider-label { color: var(--hsb-orange-bright); font-weight: 700; }
.slider-thumb {
  position: absolute; top: 50%;
  transform: translate(-50%, -50%);
  width: 20px; height: 20px;
  border-radius: 50%;
  background: rgba(255,255,255,0.94);
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.slider-row.active .slider-thumb {
  background: var(--hsb-orange-bright);
  box-shadow: 0 0 12px rgba(232,96,12,0.6);
}
.slider-value {
  font-size: 13px; font-weight: 500;
  color: var(--text-high);
  width: 48px; text-align: right; flex-shrink: 0;
  font-family: "Roboto Mono", monospace;
  font-variant-numeric: tabular-nums;
}

/* ═══════════════════════════════════════════════════════════════
   构图面板 — 示波器 + 工具瀑布流
   ═══════════════════════════════════════════════════════════════ */
.scope-section {
  display: flex; gap: var(--sp-xs);
  margin-bottom: var(--sp-md);
}
.scope-card {
  flex: 1;
  border-radius: var(--r-medium);
  background: rgba(0,0,0,0.5);
  border: 1px solid var(--hairline);
  padding: var(--sp-xs);
  overflow: hidden;
}
.scope-title {
  font-size: 10px; font-weight: 500;
  color: var(--text-low);
  letter-spacing: 0.4px;
  margin-bottom: 4px;
}
.scope-canvas {
  width: 100%; height: 70px;
  border-radius: var(--r-small);
  background: rgba(0,0,0,0.6);
  position: relative;
  overflow: hidden;
}
.histo-bars {
  position: absolute; bottom: 0; left: 0; right: 0; height: 100%;
  display: flex; align-items: flex-end;
}
.histo-bar {
  flex: 1;
  background: linear-gradient(180deg, var(--success-green), rgba(48,209,88,0.3));
  min-height: 1px;
}
.waveform-canvas {
  position: absolute; inset: 0;
  background: repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(48,209,88,0.3) 2px, rgba(48,209,88,0.3) 3px);
  opacity: 0.7;
}
.vs-ring {
  width: 50px; height: 50px;
  border: 1px solid rgba(255,255,255,0.20);
  border-radius: 50%;
  position: absolute;

const tabBar = document.getElementById('tabBar');
const panelContent = document.getElementById('panelContent');

function switchTab(tabName) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tabName}"]`).classList.add('active');
  panelContent.innerHTML = panels[tabName];
  if (tabName === 'compose') renderHistogram();
}

tabBar.addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (tab) switchTab(tab.dataset.tab);
});

function renderHistogram() {
  const c = document.getElementById('histoBars');
  if (!c) return;
  c.innerHTML = '';
  const dist = [5,8,12,18,25,35,48,62,75,82,88,92,95,96,94,90,85,78,70,62,55,48,42,38,35,32,30,28,27,26,25,24,23,22,21,20,19,18,17,16,15,14,13,12,11,10,9,8,7,6,5,4,3,2,2,1,1,1,1,1];
  dist.forEach(v => {
    const b = document.createElement('div');
    b.className = 'histo-bar';
    b.style.height = (v * 0.9) + '%';
    c.appendChild(b);
  });
}

document.addEventListener('click', e => {
  const f = e.target.closest('.film-wf-card');
  if (f) { f.parentElement.querySelectorAll('.film-wf-card').forEach(x => x.classList.remove('active')); f.classList.add('active'); }
  const cs = e.target.closest('.cs-chip');
  if (cs) { cs.parentElement.querySelectorAll('.cs-chip').forEach(x => x.classList.remove('active')); cs.classList.add('active'); }
  const fmt = e.target.closest('.format-card');
  if (fmt) { fmt.parentElement.querySelectorAll('.format-card').forEach(x => x.classList.remove('active')); fmt.classList.add('active'); }
  const crop = e.target.closest('.crop-chip');
  if (crop) { crop.parentElement.querySelectorAll('.crop-chip').forEach(x => x.classList.remove('active')); crop.classList.add('active'); }
  const cat = e.target.closest('.cat-chip');
  if (cat) { cat.parentElement.querySelectorAll('.cat-chip').forEach(x => x.classList.remove('active')); cat.classList.add('active'); }
});

document.querySelectorAll('.float-tool').forEach(t => {
  t.addEventListener('click', () => t.classList.toggle('active'));
});

function showExportToast() {
  const btn = document.querySelector('.export-btn');
  const o = btn.innerHTML;
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg> 导出成功';
  setTimeout(() => { btn.innerHTML = o; }, 2000);
}

switchTab('ai');
</script>
