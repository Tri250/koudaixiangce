<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RapidRAW · ColorOS 16 · Find X9 编辑器</title>
<style>
/* ═══════════════════════════════════════════════════════════════
   ColorOS 16 设计系统 Token（对应 Kotlin 端 Color/Type/Shapes/Motion）
   ═══════════════════════════════════════════════════════════════ */
:root {
  /* AMOLED 深黑基底 */
  --amoled-black: #060606;
  --surface-1: #0F0F10;   /* 卡片、工具栏 */
  --surface-2: #161618;   /* 底部面板、弹窗 */
  --surface-3: #1E1E22;   /* 模态弹窗 */
  --surface-4: #26262B;   /* 高亮卡片、选中态 */
  --hairline: rgba(255,255,255,0.08);
  --hairline-strong: rgba(255,255,255,0.16);

  /* 文字色阶（WCAG AA+） */
  --text-high: #F5F5F7;    /* 95% 白 */
  --text-medium: #B4B4BA;  /* 70% 白 */
  --text-low: #7A7A82;     /* 45% 白 */
  --text-disabled: rgba(255,255,255,0.30);

  /* 哈苏橙品牌色（克制使用） */
  --hsb-orange: #E8600C;
  --hsb-orange-bright: #F2803F;
  --hsb-orange-deep: #B84D0A;
  --hsb-orange-glow: rgba(232,96,12,0.50);

  /* 功能色（高饱和） */
  --clip-red: #FF453A;
  --clip-blue: #0A84FF;
  --success-green: #30D158;
  --warning-yellow: #FFD60A;
  --ai-purple: #BF5AF2;

  /* 示波器色 */
  --scope-green: #30D158;
  --scope-skin: #FF9F0A;
  --scope-r: #FF453A;
  --scope-g: #30D158;
  --scope-b: #0A84FF;

  /* 白色系交互色 */
  --slider-fill: rgba(255,255,255,0.87);
  --slider-empty: rgba(255,255,255,0.20);
  --slider-thumb: rgba(255,255,255,0.94);
  --tab-active: rgba(255,255,255,0.94);
  --tab-inactive: rgba(255,255,255,0.60);

  /* ColorOS 16 圆角阶梯（4 级） */
  --r-small: 8px;
  --r-medium: 16px;
  --r-large: 24px;
  --r-xlarge: 28px;
  --r-pill: 9999px;

  /* Motion（OPPO 自定义缓动曲线） */
  --ease-emphasized: cubic-bezier(0.2, 0.0, 0.0, 1.0);
  --ease-decelerate: cubic-bezier(0.05, 0.7, 0.1, 1.0);
  --ease-accelerate: cubic-bezier(0.3, 0.0, 0.8, 0.15);
  --dur-fast: 150ms;
  --dur-normal: 300ms;
  --dur-slow: 450ms;

  /* 间距（4dp 网格） */
  --sp-xxs: 4px;
  --sp-xs: 8px;
  --sp-sm: 12px;
  --sp-md: 16px;
  --sp-lg: 20px;
  --sp-xl: 24px;
  --sp-xxl: 32px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  /* OPPO Sans 优先 + 系统回退 */
  font-family: "OPPO Sans", "OPPO-Sans", "HarmonyOS Sans SC", -apple-system,
    "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
  background: #000;
  color: var(--text-high);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════════════════════════════════════
   手机外壳 — Find X9 比例
   ═══════════════════════════════════════════════════════════════ */
.phone {
  width: 412px;
  height: 915px;
  background: var(--amoled-black);
  border-radius: 48px;
  border: 3px solid #1a1a1a;
  box-shadow: 0 0 80px rgba(232,96,12,0.18), 0 0 24px rgba(232,96,12,0.10), 0 20px 60px rgba(0,0,0,0.8);
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
}
/* 哈苏橙氛围辉光（背景径向，底层装饰，不挡内容） */
.phone::after {
  content: '';
  position: absolute;
  top: -20%; right: -30%;
  width: 60%; height: 60%;
  background: radial-gradient(circle, rgba(232,96,12,0.12) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
/* 挖孔前摄 */
.phone::before {
  content: '';
  position: absolute;
  top: 12px; left: 50%;
  transform: translateX(-50%);
  width: 120px; height: 28px;
  background: #000;
  border-radius: var(--r-pill);
  z-index: 200;
}
/* 所有手机内子元素提升到辉光之上 */
.phone > * { position: relative; z-index: 10; }

/* ═══════════════════════════════════════════════════════════════
   状态栏（沉浸式透明）
   ═══════════════════════════════════════════════════════════════ */
.status-bar {
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 var(--sp-xl) 0 28px;
  font-size: 13px;
  font-weight: 600;
  flex-shrink: 0;
  padding-top: 8px;
  position: relative;
  z-index: 50;
  background: linear-gradient(180deg, rgba(6,6,6,0.85) 0%, transparent 100%);
}
.status-bar .right { display: flex; gap: 6px; align-items: center; }
.status-bar svg { width: 16px; height: 16px; }

/* ═══════════════════════════════════════════════════════════════
   顶栏 — 液态玻璃浮层
   ═══════════════════════════════════════════════════════════════ */
.top-bar {
  height: 48px;
  display: flex;
  align-items: center;
  padding: 0 var(--sp-xs);
  gap: var(--sp-xxs);
  flex-shrink: 0;
  position: relative;
  z-index: 40;
}
.top-bar .icon-btn {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  cursor: pointer;
  color: var(--text-medium);
  transition: all var(--dur-fast) var(--ease-emphasized);
}
.top-bar .icon-btn:hover {
  background: var(--surface-3);
  color: var(--text-high);
  transform: scale(0.92);
}
.top-bar .icon-btn svg { width: 22px; height: 22px; }
.top-bar .icon-btn.disabled { opacity: 0.3; pointer-events: none; }

/* 顶部标题胶囊 */
.title-pill {
  flex: 1;
  display: flex;
  justify-content: center;
}
.title-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px var(--sp-md);
  border-radius: var(--r-pill);
  font-size: 12px;
  font-weight: 500;
  color: var(--text-medium);
  /* 液态玻璃 */
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(20px) saturate(1.2);
  -webkit-backdrop-filter: blur(20px) saturate(1.2);
  border: 1px solid rgba(255,255,255,0.10);
}
.title-chip .dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--hsb-orange);
  box-shadow: 0 0 6px var(--hsb-orange);
}

/* 导出快捷按钮（哈苏橙品牌时刻） */
.export-shortcut {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  cursor: pointer;
  background: var(--hsb-orange);
  color: #fff;
  transition: all var(--dur-fast) var(--ease-emphasized);
  box-shadow: 0 4px 16px rgba(232,96,12,0.35);
}
.export-shortcut:hover { transform: scale(0.92); background: var(--hsb-orange-bright); }
.export-shortcut svg { width: 20px; height: 20px; }

/* ═══════════════════════════════════════════════════════════════
   预览区 — AMOLED 纯黑取景
   ═══════════════════════════════════════════════════════════════ */
.preview-area {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--amoled-black);
  display: flex;
  align-items: center;
  justify-content: center;
}
.preview-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: contrast(1.05) saturate(1.12);
}

/* 取景器四角（哈苏橙） */
.viewfinder-corner {
  position: absolute;
  width: 24px; height: 24px;
  border-color: var(--hsb-orange);
  border-style: solid;
  border-width: 0;
  opacity: 0.7;
}
.vf-tl { top: 16px; left: 16px; border-top-width: 2px; border-left-width: 2px; border-top-left-radius: 6px; }
.vf-tr { top: 16px; right: 16px; border-top-width: 2px; border-right-width: 2px; border-top-right-radius: 6px; }
.vf-bl { bottom: 16px; left: 16px; border-bottom-width: 2px; border-left-width: 2px; border-bottom-left-radius: 6px; }
.vf-br { bottom: 16px; right: 16px; border-bottom-width: 2px; border-right-width: 2px; border-bottom-right-radius: 6px; }

/* 浮层工具条 — 液态玻璃浮层（28dp 圆角） */
.floating-toolbar {
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 2px;
  align-items: center;
  padding: 6px;
  border-radius: var(--r-xlarge);
  /* 液态玻璃：真实模糊 + 多层渐变 */
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(32px) saturate(1.3);
  -webkit-backdrop-filter: blur(32px) saturate(1.3);
  border: 1px solid rgba(255,255,255,0.14);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.32);
}
.float-tool {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px; height: 36px;
  border-radius: var(--r-large);
  cursor: pointer;
  color: var(--text-medium);
  transition: all var(--dur-fast) var(--ease-emphasized);
  position: relative;
}
.float-tool:hover { color: var(--text-high); background: rgba(255,255,255,0.08); }
.float-tool.active {
  color: var(--hsb-orange-bright);
  background: rgba(232,96,12,0.18);
  box-shadow: 0 0 12px rgba(232,96,12,0.25);
}
.float-tool svg { width: 18px; height: 18px; }
.float-tool .badge {
  position: absolute;
  top: 2px; right: 2px;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--hsb-orange);
}

/* 场景识别标签 — 液态玻璃胶囊 */
.scene-badge {
  position: absolute;
  bottom: 16px;
  left: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px var(--sp-md);
  border-radius: var(--r-pill);
  font-size: 11px;
  /* 液态玻璃 */
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px) saturate(1.2);
  -webkit-backdrop-filter: blur(20px) saturate(1.2);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.28);
}
.scene-badge .label { color: var(--text-low); }
.scene-badge .value { color: var(--hsb-orange-bright); font-weight: 700; }
.scene-badge .conf { color: var(--text-low); font-size: 10px; }

/* HDR 标签 */
.hdr-badge {
  position: absolute;
  bottom: 16px;
  right: 16px;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 5px 10px;
  border-radius: var(--r-pill);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: var(--text-high);
  background: rgba(10,132,255,0.20);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(10,132,255,0.35);
}

/* ═══════════════════════════════════════════════════════════════
   底部面板区 — 液态玻璃底部抽屉（28dp 顶部圆角）
   ═══════════════════════════════════════════════════════════════ */
.panel-area {
  flex-shrink: 0;
  height: 380px;
  position: relative;
  /* 液态玻璃底部面板 */
  background: rgba(15,15,16,0.92);
  backdrop-filter: blur(28px) saturate(1.2);
  -webkit-backdrop-filter: blur(28px) saturate(1.2);
  border-top: 1px solid rgba(255,255,255,0.10);
  border-radius: var(--r-xlarge) var(--r-xlarge) 0 0;
  box-shadow: 0 -8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.20);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* 顶部把手 */
.panel-handle {
  width: 36px; height: 4px;
  border-radius: var(--r-pill);
  background: rgba(255,255,255,0.30);
  margin: 8px auto 4px;
  flex-shrink: 0;
}

/* Tab 栏 — 强化可见性 */
.bottom-tabs {
  display: flex;
  padding: 6px 8px 8px;
  flex-shrink: 0;
  background: rgba(0,0,0,0.25);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.tab {
  flex: 1;
  padding: 10px 0 8px;
  text-align: center;
  cursor: pointer;
  position: relative;
  border-radius: var(--r-medium);
  transition: background var(--dur-normal) var(--ease-emphasized);
}
.tab:hover { background: rgba(255,255,255,0.04); }
.tab .tab-icon {
  width: 24px; height: 24px;
  margin: 0 auto 4px;
  display: block;
  color: var(--tab-inactive);
  transition: all var(--dur-normal) var(--ease-emphasized);
}
.tab .tab-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--tab-inactive);
  letter-spacing: 0.5px;
  transition: color var(--dur-normal) var(--ease-emphasized);
}
.tab.active {
  background: rgba(232,96,12,0.10);
}
.tab.active .tab-icon {
  color: var(--hsb-orange-bright);
  transform: translateY(-1px) scale(1.10);
  /* 弹性回弹 */
  transition: all var(--dur-normal) cubic-bezier(0.34, 1.56, 0.64, 1);
  filter: drop-shadow(0 0 6px rgba(232,96,12,0.5));
}
.tab.active .tab-label {
  color: var(--hsb-orange-bright);
  font-weight: 700;
}
/* 选中下划线（哈苏橙品牌色） */
.tab.active::after {
  content: '';
  position: absolute;
  bottom: 2px;
  left: 50%;
  transform: translateX(-50%);
  width: 32px;
  height: 3px;
  background: var(--hsb-orange);
  border-radius: var(--r-pill);
  box-shadow: 0 0 10px rgba(232,96,12,0.8);
}

/* 面板内容滚动区 */
.panel-content {
  flex: 1;
  overflow-y: auto;
  padding: 4px var(--sp-md) var(--sp-md);
}
.panel-content::-webkit-scrollbar { width: 0; }

/* ═══════════════════════════════════════════════════════════════
   AI 面板
   ═══════════════════════════════════════════════════════════════ */
.ai-panel { padding: var(--sp-xs) 0; }

/* 场景识别卡片（液态玻璃卡片） */
.scene-card {
  display: flex;
  align-items: center;
  gap: var(--sp-sm);
  padding: 10px var(--sp-md);
  border-radius: var(--r-medium);
  margin-bottom: var(--sp-md);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
}
.scene-card .sc-label { font-size: 11px; color: var(--text-low); }
.scene-card .sc-value { font-size: 14px; color: var(--hsb-orange-bright); font-weight: 700; }
.scene-card .sc-conf { margin-left: auto; font-size: 11px; color: var(--text-low); }

/* AI 功能卡片 */
.ai-card {
  display: flex;
  align-items: center;
  gap: var(--sp-md);
  padding: var(--sp-md);
  border-radius: var(--r-medium);
  margin-bottom: var(--sp-xs);
  cursor: pointer;
  transition: all var(--dur-fast) var(--ease-emphasized);
  background: rgba(255,255,255,0.04);
  border: 1px solid transparent;
}
.ai-card:hover {
  background: rgba(255,255,255,0.08);
  border-color: var(--hairline-strong);
  transform: scale(0.99);
}
.ai-card.primary {
  background: linear-gradient(135deg, rgba(232,96,12,0.12), rgba(232,96,12,0.04));
  border-color: rgba(232,96,12,0.25);
  padding: var(--sp-lg) var(--sp-md);
}
.ai-icon {
  width: 40px; height: 40px;
  border-radius: var(--r-medium);
  background: var(--surface-3);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.ai-card.primary .ai-icon {
  background: var(--hsb-orange);
  box-shadow: 0 4px 12px rgba(232,96,12,0.30);
}
.ai-icon svg { width: 20px; height: 20px; stroke: var(--text-medium); }
.ai-card.primary .ai-icon svg { stroke: #fff; }
.ai-text { flex: 1; }
.ai-title { font-size: 14px; font-weight: 600; color: var(--text-high); }
.ai-card.primary .ai-title { font-size: 16px; }
.ai-sub { font-size: 11px; color: var(--text-low); margin-top: 2px; line-height: 1.4; }
.ai-badge {
  width: 16px; height: 16px;
  color: var(--hsb-orange-bright);
}

/* ═══════════════════════════════════════════════════════════════
   滤镜面板 — 胶片预设横向滚动
   ═══════════════════════════════════════════════════════════════ */
.filter-panel { padding: var(--sp-xs) 0; }
.filter-section-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-low);
  letter-spacing: 0.5px;
  margin: var(--sp-sm) var(--sp-xs) var(--sp-sm);
  text-transform: uppercase;
}
.filter-row {
  display: flex;
  gap: var(--sp-sm);
  overflow-x: auto;
  padding: 0 var(--sp-md) var(--sp-md);
  scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }
.film-card {
  flex-shrink: 0;
  width: 96px;
  cursor: pointer;
  transition: transform var(--dur-normal) var(--ease-emphasized);
}
.film-card:hover { transform: translateY(-2px); }
.film-thumb {
  width: 96px; height: 128px;
  border-radius: var(--r-medium);
  overflow: hidden;
  border: 2px solid transparent;
  transition: border-color var(--dur-fast) var(--ease-emphasized);
  position: relative;
}
.film-card.active .film-thumb {
  /* 哈苏橙仅用于胶片选中 */
  border-color: var(--hsb-orange);
  box-shadow: 0 0 16px rgba(232,96,12,0.30);
}
.film-thumb img { width: 100%; height: 100%; object-fit: cover; }
.film-name {
  font-size: 11px;
  color: var(--text-medium);
  text-align: center;
  margin-top: 6px;
  font-weight: 500;
}
.film-card.active .film-name { color: var(--text-high); font-weight: 700; }

/* LUT 库入口 */
.lut-entry {
  display: flex;
  align-items: center;
  gap: var(--sp-sm);
  padding: var(--sp-md);
  border-radius: var(--r-medium);
  margin: 0 var(--sp-md) var(--sp-sm);
  cursor: pointer;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--hairline);
  transition: all var(--dur-fast) var(--ease-emphasized);
}
.lut-entry:hover { background: rgba(255,255,255,0.08); }
.lut-entry svg { width: 20px; height: 20px; color: var(--text-medium); }
.lut-entry .lut-title { font-size: 14px; font-weight: 500; color: var(--text-high); flex: 1; }
.lut-entry .lut-count { font-size: 11px; color: var(--text-low); }

/* ═══════════════════════════════════════════════════════════════
   调整面板 — 滑块组
   ═══════════════════════════════════════════════════════════════ */
.adjust-panel { padding: var(--sp-xs) 0; }
.adjust-group {
  margin-bottom: var(--sp-lg);
}
.adjust-group-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-low);
  letter-spacing: 0.5px;
  margin-bottom: var(--sp-xs);
  padding: 0 var(--sp-xs);
}
.slider-row {
  display: flex;
  align-items: center;
  gap: var(--sp-md);
  padding: 10px var(--sp-xs);
  height: 48px;
}
.slider-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-medium);
  width: 64px;
  flex-shrink: 0;
}
.slider-track {
  flex: 1;
  height: 4px;
  border-radius: var(--r-pill);
  background: var(--slider-empty);
  position: relative;
}
.slider-fill {
  position: absolute;
  top: 0; bottom: 0;
  border-radius: var(--r-pill);
  background: var(--slider-fill);
}
.slider-row.active .slider-fill {
  background: linear-gradient(90deg, var(--hsb-orange-deep), var(--hsb-orange-bright));
  box-shadow: 0 0 8px rgba(232,96,12,0.4);
}
.slider-row.active .slider-thumb {
  background: var(--hsb-orange-bright);
  box-shadow: 0 0 12px rgba(232,96,12,0.6);
}
.slider-row.active .slider-label {
  color: var(--hsb-orange-bright);
  font-weight: 700;
}
.slider-thumb {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 22px; height: 22px;
  border-radius: 50%;

   ═══════════════════════════════════════════════════════════════ */
.compose-panel { padding: var(--sp-xs) 0; }

.scope-section {
  display: flex;
  gap: var(--sp-sm);
  padding: 0 var(--sp-md) var(--sp-md);

  flex: 1;

  border: 1px solid var(--hairline);
  padding: var(--sp-xs);
  overflow: hidden;

  font-size: 10px;
  font-weight: 500;
  color: var(--text-low);
  letter-spacing: 0.4px;
  margin-bottom: 4px;
}
.scope-canvas {
  width: 100%;
  height: 80px;
  border-radius: var(--r-small);
  background: rgba(0,0,0,0.6);
  position: relative;
  overflow: hidden;
}

/* 直方图绘制 */

  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 100%;
  display: flex;
  align-items: flex-end;
  gap: 0;
}
.histo-bar {
  flex: 1;
  background: linear-gradient(180deg, var(--scope-green), rgba(48,209,88,0.3));
  min-height: 1px;
  border-radius: 1px 1px 0 0;
}

/* 波形图 */

  position: absolute;
  inset: 0;
  background:

  opacity: 0.7;
}

/* 矢量图 */
.vectorscope-canvas {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.vs-ring {
  width: 60px; height: 60px;
  border: 1px solid rgba(255,255,255,0.20);
  border-radius: 50%;
  position: relative;
}
.vs-ring::before {
  content: '';
  position: absolute;
  inset: 8px;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 50%;
}
.vs-dot {
  position: absolute;
  width: 3px; height: 3px;
  border-radius: 50%;
}

.crop-ratios {
  display: flex;
  gap: var(--sp-xs);
  padding: 0 var(--sp-md) var(--sp-md);
  overflow-x: auto;
  scrollbar-width: none;
}

.crop-chip {
  flex-shrink: 0;
  padding: 8px var(--sp-md);
  border-radius: var(--r-pill);
  font-size: 12px;
  font-weight: 500;
  color: var(--text-medium);

  border-color: rgba(232,96,12,0.40);
  font-weight: 700;
}

// Tab 切换
const tabBar = document.getElementById('tabBar');
const panelContent = document.getElementById('panelContent');

function switchTab(tabName) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tabName}"]`).classList.add('active');
  panelContent.innerHTML = panels[tabName];
  if (tabName === 'compose') renderHistogram();
}

tabBar.addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (tab) switchTab(tab.dataset.tab);
});

// 直方图渲染
function renderHistogram() {
  const container = document.getElementById('histoBars');
  if (!container) return;
  container.innerHTML = '';
  // 模拟 RGB 直方图分布
  const distribution = [
    5,8,12,18,25,35,48,62,75,82,88,92,95,96,94,90,85,78,70,62,
    55,48,42,38,35,32,30,28,27,26,25,24,23,22,21,20,19,18,17,16,
    15,14,13,12,11,10,9,8,7,6,5,4,3,2,2,1,1,1,1,1
  ];
  distribution.forEach(v => {
    const bar = document.createElement('div');
    bar.className = 'histo-bar';
    bar.style.height = (v * 0.9) + '%';
    container.appendChild(bar);
  });
}

// 胶片卡片选中
document.addEventListener('click', e => {
  const film = e.target.closest('.film-card');
  if (film) {
    film.parentElement.querySelectorAll('.film-card').forEach(f => f.classList.remove('active'));
    film.classList.add('active');
  }
  const cs = e.target.closest('.cs-chip');
  if (cs) {
    cs.parentElement.querySelectorAll('.cs-chip').forEach(c => c.classList.remove('active'));
    cs.classList.add('active');
  }
  const fmt = e.target.closest('.format-card');
  if (fmt) {
    fmt.parentElement.querySelectorAll('.format-card').forEach(f => f.classList.remove('active'));
    fmt.classList.add('active');
  }
  const crop = e.target.closest('.crop-chip');
  if (crop) {
    crop.parentElement.querySelectorAll('.crop-chip').forEach(c => c.classList.remove('active'));
    crop.classList.add('active');
  }
});

// 浮动工具切换
document.querySelectorAll('.float-tool').forEach(t => {
  t.addEventListener('click', () => {
    t.classList.toggle('active');
  });
});

// 导出提示
function showExportToast() {
  const btn = document.querySelector('.export-btn');
  const original = btn.innerHTML;
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg> 导出成功';
  setTimeout(() => { btn.innerHTML = original; }, 2000);
}

// 初始加载 AI 面板
switchTab('ai');
</script>
