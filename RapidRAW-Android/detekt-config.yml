# detekt — Kotlin 静态代码分析配置
# v1.10.0 正式版代码质量规范

build:
  maxIssues: 0
  excludeCorrectable: false
  weights:
    complexity: 2
    formatting: 1
    longParameterList: 1
    comments: 1

style:
  active: true
  MaxLineLength:
    active: true
    maxLineLength: 140
    excludePackageStatements: true
    excludeImportStatements: true
    excludeCommentStatements: false
  MagicNumber:
    active: true
    ignoreNumbers: ['-1', '0', '1', '2', '100', '255', '256', '1024', '65535']
    ignoreHashCodeFunction: true
    ignorePropertyDeclaration: true
    ignoreAnnotation: true
  UnusedImports:
    active: true
  WildcardImport:
    active: true
    excludeImports: ['java.util.*', 'kotlinx.android.synthetic.*']
  ForbiddenComment:
    active: true
    values: ['TODO:', 'FIXME:', 'HACK:', 'XXX:']
    allowedPatterns: ''
  ReturnCount:
    active: true
    max: 5
    excludeGuardClauses: true

complexity:
  active: true
  TooManyFunctions:
    active: true
    thresholdInFiles: 20
    thresholdInClasses: 15
    thresholdInInterfaces: 10
    ignoreOverridden: true
  LongParameterList:
    active: true
    functionThreshold: 8
    constructorThreshold: 10
    ignoreDefaultParameters: true
  LargeClass:
    active: true
    threshold: 400
  ComplexMethod:
    active: true
    threshold: 15
  NestedBlockDepth:
    active: true
    threshold: 5

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: true
    exceptionNames:
      - Exception
      - RuntimeException
      - Throwable
      - Error
    allowedExceptionNameRegex: ^(_|ignore|expected)$
  InstanceOfCheckForException:
    active: true
  NotImplementedDeclaration:
    active: false
  ThrowingExceptionsWithoutMessageOrCause:
    active: true
    excludes: ['**/test/**']
  SwallowedException:
    active: true
    allowedExceptionNameRegex: ^(_|ignore|expected)$

performance:
  active: true
  SpreadOperator:
    active: true
  ForEachOnRange:
    active: true
  ArrayPrimitive:
    active: true

naming:
  active: true
  ClassNaming:
    active: true
    classPattern: '[A-Z][a-zA-Z0-9]*'
  FunctionNaming:
    active: true
    functionPattern: '([a-z][a-zA-Z0-9]*)|(`.*`)'
    ignoreAnnotated: ['Composable']
  VariableNaming:
    active: true
    variablePattern: '[a-z][A-Za-z0-9]*'
  ConstantNaming:
    active: true
    constantPattern: '[A-Z][A-Z_0-9]*'

coroutines:
  active: true
  GlobalCoroutineUsage:
    active: true
  RedundantSuspendModifier:
    active: true
  SuspendFunWithFlowReturnType:
    active: true