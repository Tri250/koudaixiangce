name: Lint

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend-lint:
    name: Frontend Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: RapidRAW/package-lock.json

      - name: Install dependencies
        working-directory: RapidRAW
        run: npm ci

      - name: Check Formatting
        working-directory: RapidRAW
        run: npm run format:check
        continue-on-error: true

      - name: Run ESLint
        working-directory: RapidRAW
        run: npm run lint
        continue-on-error: true

      - name: Check Translation Sync
        working-directory: RapidRAW
        run: npm run i18n:check
        continue-on-error: true

  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
          rustflags: ''
          rust-src-dir: RapidRAW/src-tauri

      - name: Check formatting
        working-directory: RapidRAW/src-tauri
        run: cargo fmt -p RapidRAW -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
          rustflags: ''
          rust-src-dir: RapidRAW/src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Clippy
        working-directory: RapidRAW/src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings
