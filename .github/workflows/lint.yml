name: Lint

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend-lint:
    name: Frontend Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check Formatting
        run: npm run format:check
        continue-on-error: true

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Check Translation Sync
        run: npm run i18n:check
        continue-on-error: true

  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt -p RapidRAW -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Clippy
        working-directory: src-tauri
        run: |
          cargo clippy --all-targets -- -D warnings \
            -A dead_code \
            -A unused_variables \
            -A unused_mut \
            -A clippy::collapsible_if \
            -A clippy::collapsible_else_if \
            -A clippy::manual_range_contains \
            -A clippy::manual_div_ceil \
            -A clippy::manual_clamp \
            -A clippy::excessive_precision \
            -A clippy::too_many_arguments \
            -A clippy::question_mark \
            -A clippy::doc_lazy_continuation \
            -A clippy::redundant_closure \
            -A clippy::unnecessary_min_or_max \
            -A clippy::needless_range_loop \
            -A clippy::upper_case_acronyms \
            -A clippy::useless_format \
            -A clippy::unnecessary_cast \
            -A clippy::derivable_impls \
            -A clippy::unnecessary_filter_map \
            -A clippy::while_let_loop \
            -A private_interfaces \
            -A private_bounds \
            -A clippy::module_name_repetitions
