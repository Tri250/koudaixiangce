name: 'Release: Build & Package App'

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Build platform'
        required: false
        type: choice
        default: 'all'
        options:
          - all
          - android
          - linux
          - macos
          - windows
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    outputs:
      release-id: ${{ steps.create.outputs.release-id }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        id: create
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --draft=false
          RELEASE_ID=$(gh release view "${{ github.ref_name }}" --json id -q '.id')
          echo "release-id=$RELEASE_ID" >> "$GITHUB_OUTPUT"
          echo "Created release ${{ github.ref_name }} (ID: $RELEASE_ID)"
        env:
          GH_TOKEN: ${{ github.token }}

  release:
    needs: create-release
    if: |
      always()
      && (needs.create-release.outputs.release-id != '' || github.event_name == 'release')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            builds-args: '--bundles nsis'
            target: ''
            asset-prefix: '01'
          - platform: 'windows-11-arm'
            builds-args: '--bundles nsis'
            target: 'aarch64-pc-windows-msvc'
            asset-prefix: '01'
          - platform: 'macos-14'
            target: aarch64-apple-darwin
            asset-prefix: '02'
          - platform: 'macos-15-intel'
            target: x86_64-apple-darwin
            asset-prefix: '02'
          - platform: 'ubuntu-22.04'
            target: ''
            asset-prefix: '03'
          - platform: 'ubuntu-22.04-arm'
            target: ''
            asset-prefix: '03'
          - platform: 'ubuntu-24.04'
            target: ''
            asset-prefix: '03'
          - platform: 'ubuntu-24.04-arm'
            target: ''
            asset-prefix: '03'
          # Android arm64-v8a (primary target for domestic app stores)
          - platform: 'ubuntu-latest'
            mobile: 'android'
            target: 'aarch64-linux-android'
            args: '--target aarch64'
            asset-prefix: '04'
    uses: ./.github/workflows/build.yml
    with:
      release-id: ${{ needs.create-release.outputs.release-id || github.event.release.id }}
      platform: ${{ matrix.platform }}
      target: ${{ matrix.target }}
      build-args: ${{ matrix.args }}
      asset-name-pattern: '[name]_v[version]_[platform]_[arch][ext]'
      asset-prefix: ${{ matrix.asset-prefix }}
      mobile: ${{ matrix.mobile }}
    secrets: inherit
    permissions:
      contents: write
